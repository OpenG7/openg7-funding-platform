services:
  api:
    build:
      context: .
      dockerfile: apps/funding-api/Dockerfile
    env_file:
      - .env
    environment:
      FUNDING_PLATFORM_ENV: production
      FUNDING_API_PORT: 3333
    expose:
      - '3333'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3333/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/funding-web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '8080:80'
    restart: unless-stopped
