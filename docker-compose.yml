services:
  traefik:
    image: traefik:v3.2
    command:
      - --configFile=/etc/traefik/traefik.yml
      - --certificatesResolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@example.com}
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
      - '${TRAEFIK_DASHBOARD_BIND:-127.0.0.1:8081}:8080'
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/acme:/letsencrypt
    networks:
      - edge
    restart: unless-stopped
    cpus: '0.50'
    mem_limit: 256m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    healthcheck:
      test: ['CMD', 'traefik', 'healthcheck', '--ping']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  api:
    image: ${API_IMAGE:-openg7-funding-api:local}
    build:
      context: .
      dockerfile: apps/funding-api/Dockerfile
    env_file:
      - .env
    environment:
      FUNDING_PLATFORM_ENV: production
      FUNDING_API_PORT: 3333
      APP_DOMAIN: ${APP_DOMAIN:-openg7.org}
      FUNDING_PUBLIC_BASE_URL: ${FUNDING_PUBLIC_BASE_URL:-https://openg7.org}
      FUNDING_ALLOWED_ORIGINS: ${FUNDING_ALLOWED_ORIGINS:-https://openg7.org,https://www.openg7.org}
      FUNDING_ALLOWED_AMOUNTS: ${FUNDING_ALLOWED_AMOUNTS:-5,10,25,50,100}
    expose:
      - '3333'
    networks:
      - edge
    restart: unless-stopped
    init: true
    cpus: '0.75'
    mem_limit: 512m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 2048
        hard: 4096
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3333/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    image: ${WEB_IMAGE:-openg7-funding-web:local}
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
      traefik:
        condition: service_healthy
    expose:
      - '8080'
    networks:
      - edge
    restart: unless-stopped
    cpus: '0.50'
    mem_limit: 256m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 2048
        hard: 4096
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/health | grep -q ok']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - '${CADVISOR_BIND:-127.0.0.1:8082}:8080'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - edge
    restart: unless-stopped
    cpus: '0.25'
    mem_limit: 256m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  edge:
    name: openg7-edge
    driver: bridge
