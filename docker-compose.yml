services:
  traefik:
    image: traefik:v3.2
    command:
      - --configFile=/etc/traefik/traefik.yml
      - --certificatesResolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@example.com}
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
      - '${TRAEFIK_DASHBOARD_BIND:-127.0.0.1:8081}:8080'
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/acme:/letsencrypt
    networks:
      - edge
    restart: unless-stopped
    cpus: '0.50'
    mem_limit: 256m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    healthcheck:
      test: ['CMD', 'traefik', 'healthcheck', '--ping']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  api:
    image: ${API_IMAGE:-openg7-funding-api:local}
    build:
      context: .
      dockerfile: apps/funding-api/Dockerfile
    env_file:
      - .env
    environment:
      FUNDING_PLATFORM_ENV: ${FUNDING_PLATFORM_ENV:-production}
      FUNDING_API_PORT: 3333
      APP_DOMAIN: ${APP_DOMAIN:-openg7.org}
      FUNDING_PUBLIC_BASE_URL: ${FUNDING_PUBLIC_BASE_URL:-https://openg7.org}
      FUNDING_ALLOWED_ORIGINS: ${FUNDING_ALLOWED_ORIGINS:-https://openg7.org,https://www.openg7.org}
      FUNDING_ALLOWED_AMOUNTS: ${FUNDING_ALLOWED_AMOUNTS:-5,10,25,50}
      FUNDING_BUSINESS_SPONSORSHIP_ENABLED: ${FUNDING_BUSINESS_SPONSORSHIP_ENABLED:-false}
      FUNDING_ADMIN_TOKEN: ${FUNDING_ADMIN_TOKEN:-}
      FUNDING_ADMIN_SESSION_SECRET: ${FUNDING_ADMIN_SESSION_SECRET:-}
      FUNDING_ADMIN_SESSION_TTL_MINUTES: ${FUNDING_ADMIN_SESSION_TTL_MINUTES:-60}
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-mail.papamail.net}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-notify@openg7.org}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_CONNECTION_TIMEOUT_MS: ${SMTP_CONNECTION_TIMEOUT_MS:-10000}
      SMTP_GREETING_TIMEOUT_MS: ${SMTP_GREETING_TIMEOUT_MS:-10000}
      SMTP_SOCKET_TIMEOUT_MS: ${SMTP_SOCKET_TIMEOUT_MS:-20000}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-OpenG7}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-notify@openg7.org}
      MAIL_REPLY_TO_NAME: ${MAIL_REPLY_TO_NAME:-OpenG7}
      MAIL_REPLY_TO_ADDRESS: ${MAIL_REPLY_TO_ADDRESS:-contact@openg7.org}
      FUNDING_ADMIN_NOTIFICATION_EMAIL: ${FUNDING_ADMIN_NOTIFICATION_EMAIL:-}
      FUNDING_EMAIL_QUEUE_POLL_INTERVAL_MS: ${FUNDING_EMAIL_QUEUE_POLL_INTERVAL_MS:-30000}
      FUNDING_EMAIL_QUEUE_BATCH_SIZE: ${FUNDING_EMAIL_QUEUE_BATCH_SIZE:-10}
      FUNDING_SPONSOR_LOGO_STORAGE_DIR: ${FUNDING_SPONSOR_LOGO_STORAGE_DIR:-/app/var/sponsor-logos}
      FUNDING_SPONSOR_LOGO_MAX_BYTES: ${FUNDING_SPONSOR_LOGO_MAX_BYTES:-524288}
      SPONSOR_MEDIA_STORAGE_DRIVER: ${SPONSOR_MEDIA_STORAGE_DRIVER:-local}
      SPONSOR_MEDIA_REGION: ${SPONSOR_MEDIA_REGION:-}
      SPONSOR_MEDIA_ENDPOINT: ${SPONSOR_MEDIA_ENDPOINT:-}
      SPONSOR_MEDIA_PUBLIC_BUCKET: ${SPONSOR_MEDIA_PUBLIC_BUCKET:-}
      SPONSOR_MEDIA_PUBLIC_BASE_URL: ${SPONSOR_MEDIA_PUBLIC_BASE_URL:-}
      SPONSOR_MEDIA_PRIVATE_BUCKET: ${SPONSOR_MEDIA_PRIVATE_BUCKET:-}
      SPONSOR_MEDIA_PRIVATE_BASE_URL: ${SPONSOR_MEDIA_PRIVATE_BASE_URL:-}
      OVH_S3_ACCESS_KEY_ID: ${OVH_S3_ACCESS_KEY_ID:-}
      OVH_S3_SECRET_ACCESS_KEY: ${OVH_S3_SECRET_ACCESS_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-}
    volumes:
      - sponsor-logos:/app/var/sponsor-logos
    expose:
      - '3333'
    networks:
      - edge
      - data
    restart: unless-stopped
    init: true
    cpus: '0.75'
    mem_limit: 512m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 2048
        hard: 4096
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3333/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    profiles:
      - database
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openg7_funding}
      POSTGRES_USER: ${POSTGRES_USER:-openg7_funding}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_only_for_local_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - data
    restart: unless-stopped
    cpus: '0.50'
    mem_limit: 512m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 2048
        hard: 4096
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: ${WEB_IMAGE:-openg7-funding-web:local}
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
      traefik:
        condition: service_healthy
    ports:
      - '${WEB_BIND:-127.0.0.1:8080}:8080'
    expose:
      - '8080'
    networks:
      - edge
    restart: unless-stopped
    cpus: '0.50'
    mem_limit: 256m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 2048
        hard: 4096
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/health | grep -q ok']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - '${CADVISOR_BIND:-127.0.0.1:8082}:8080'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - edge
    restart: unless-stopped
    cpus: '0.25'
    mem_limit: 256m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  edge:
    name: openg7-edge
    driver: bridge
  data:
    name: openg7-data
    driver: bridge
    internal: true

volumes:
  postgres-data:
    name: openg7-postgres-data
  sponsor-logos:
    name: openg7-sponsor-logos
